<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Commander | AI Incident Intelligence</title>
    
    <!-- Design System & Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b'
                        },
                        brand: {
                            primary: '#3b82f6',
                            secondary: '#6366f1',
                            accent: '#f59e0b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    borderRadius: {
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .glass-panel {
                @apply bg-slate-900/60 backdrop-blur-md border border-white/10 shadow-xl;
            }
            .sidebar-link {
                @apply flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200 cursor-pointer;
            }
            .sidebar-link.active {
                @apply bg-brand-primary/10 text-brand-primary border border-brand-primary/20;
            }
            .btn-primary {
                @apply bg-brand-primary hover:bg-blue-500 text-white font-semibold py-2.5 px-6 rounded-xl shadow-lg shadow-brand-primary/20 transition-all active:scale-95;
            }
            .skeleton {
                @apply bg-slate-800 animate-pulse rounded;
            }
        }

        body {
            @apply bg-slate-950 text-slate-200 antialiased;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,10%,0.5) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(250,100%,10%,0.5) 0, transparent 50%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-800 rounded-full hover:bg-slate-700; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root"></div>

    <!-- Core Logic (React App) -->
    <script type="text/babel" src="/static/js/Dashboard.js"></script>
</body>
</html>
